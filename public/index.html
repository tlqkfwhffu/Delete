<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1대1 채팅</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- 로그인 버튼 -->
  <div id="login-screen">

  <div class="login-card">

    <h1>로그인</h1>

    <button onclick="login()" class="google-login-btn">

      <img
        src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
        width="22"
      >

      Google로 로그인

    </button>

  </div>

</div>

  </div>

  <!-- 앱 -->
  <div class="app-container" id="app" style="display:none;">

    <!-- 왼쪽 -->
    <div class="sidebar">

      <h3>접속 중</h3>

      <div id="user-list"></div>

    </div>

    <!-- 오른쪽 -->
    <div class="chat-container">

      <div class="header">

        <h2>💬 1대1 채팅</h2>

        <div id="status" class="status">
          로그인 필요
        </div>

      </div>

      <!-- 프로필 -->
      <div id="profile" class="profile"></div>

      <!-- 닉네임 -->
      <div id="nickname-box" style="display:none;">

        <input
          type="text"
          id="nickname"
          placeholder="닉네임 입력"
        >

        <button onclick="setNickname()">
          입장
        </button>

      </div>

      <!-- 메시지 -->
      <div id="messages" class="messages"></div>

      <!-- 입력 -->
      <div class="input-area">

        <input
          type="text"
          id="input"
          placeholder="메시지를 입력하세요..."
          disabled
        >

        <button
          id="send-btn"
          onclick="sendMessage()"
          disabled
        >
          전송
        </button>

      </div>

    </div>

  </div>
</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
  import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDy203zE5wTzy_F8vShubi5cDqmn-dWMLY",
    authDomain: "delete-e7dab.firebaseapp.com",
    projectId: "delete-e7dab",
    storageBucket: "delete-e7dab.firebasestorage.app",
    messagingSenderId: "814099915759",
    appId: "1:814099915759:web:c0cfcd2d033c2aa2e64c1a",
    measurementId: "G-QX4FYSE89W"
  };

  const app = initializeApp(firebaseConfig);

  const db = getFirestore(app);

  const auth = getAuth(app);

  const provider = new GoogleAuthProvider();

  window.login = async function () {
    try {
      const result = await signInWithPopup(auth, provider);

      const user = result.user;

      alert(user.displayName + " 로그인 성공");

      document.getElementById('login-screen').style.display = 'none';
      connectSocket();

      document.getElementById('app').style.display = 'flex';

      document.getElementById('nickname-box').style.display = 'flex';
      
      const savedNickname = localStorage.getItem('nickname');
      
      if (savedNickname) {
        document.getElementById('nickname').value =
        savedNickname;
      }

    document.getElementById('profile').innerHTML = `
      <img src="${user.photoURL}">
      <div>
        <div>${user.displayName}</div>
        <small>${user.email}</small>
      </div>
    `;

      console.log(user);

    } catch (error) {
      console.error(error);
    }
  };
  window.saveMessage = async function (text, sender) {

  await addDoc(collection(db, "messages"), {

    text,
    sender,
    time: Date.now()

  });

};
</script>
</body>
</html>
